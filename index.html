<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Független használt autó állapotfelmérés Győrben és 50km-es körzetében. Helyszíni átvizsgálás, diagnosztika, próbakör – Nézzük Át!">
  <title>Nézzük Át! – Független Autó Átvizsgálás | Győr &amp; Környéke</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg-main: #0a0c12;
      --bg-card: #12151f;
      --bg-card-hover: #1a1f2e;
      --accent: #ff6a00;
      --accent-glow: rgba(255, 106, 0, 0.3);
      --text-main: #f4f5f7;
      --text-muted: #a1a8b3;
      --white: #ffffff;
      --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-main);
      color: var(--text-main);
      font-family: 'Montserrat', sans-serif;
      line-height: 1.7;
    }

    .container { max-width: 1280px; margin: 0 auto; padding: 0 2rem; }

    /* NAV */
    .navbar {
      position: fixed; top: 0; left: 0; width: 100%;
      background: rgba(10, 12, 18, 0.95); backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.08); z-index: 9999;
    }
    .nav-container {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 2rem;
    }
    .logo {
      display: flex; align-items: center; gap: 12px; font-weight: 800;
      font-size: 1.45rem; letter-spacing: 0.5px;
    }
    .logo-img {
      height: 52px; width: 52px; border-radius: 50%;
      border: 3px solid var(--accent); object-fit: cover;
    }
    .nav-links {
      display: flex; gap: 2rem; list-style: none;
    }
    .nav-links a {
      color: var(--text-muted); text-decoration: none; font-weight: 600;
      transition: var(--transition);
    }
    .nav-links a:hover { color: var(--accent); }

    /* HERO */
    .hero {
      min-height: 100vh; display: flex; align-items: center;
      background: linear-gradient(rgba(10,12,18,0.65), rgba(10,12,18,0.85)), 
                  url('https://images.unsplash.com/photo-1583121274602-3e2820c69888?auto=format&fit=crop&q=80&w=2070') center/cover no-repeat;
      text-align: center; position: relative;
    }
    .hero-content { position: relative; z-index: 2; max-width: 900px; margin: 0 auto; padding: 0 1rem; }
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,106,0,0.15); color: var(--accent);
      padding: 0.7rem 1.4rem; border-radius: 50px; font-weight: 700;
      font-size: 0.9rem; letter-spacing: 1px; border: 1px solid rgba(255,106,0,0.4);
    }
    .hero h1 {
      font-size: 3.8rem; font-weight: 900; line-height: 1.1;
      margin: 1.5rem 0; text-transform: uppercase;
    }
    .highlight-text { color: var(--accent); text-shadow: 0 0 40px var(--accent-glow); }
    .hero-sub { font-size: 1.25rem; color: var(--text-muted); margin-bottom: 2.5rem; }

    .cta-btn {
      padding: 1.1rem 2.4rem; border-radius: 12px; font-weight: 700;
      text-transform: uppercase; font-size: 0.95rem; transition: var(--transition);
      display: inline-flex; align-items: center; gap: 10px;
    }
    .cta-btn.primary {
      background: var(--accent); color: #000;
    }
    .cta-btn.primary:hover { transform: translateY(-4px); box-shadow: 0 15px 30px var(--accent-glow); }

    /* SECTIONS */
    section { padding: 7rem 0; }
    .section-header {
      text-align: center; margin-bottom: 4rem;
    }
    .section-header h2 {
      font-size: 2.6rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .line {
      width: 70px; height: 5px; background: var(--accent);
      margin: 1.2rem auto; border-radius: 3px; box-shadow: 0 0 20px var(--accent-glow);
    }

    .checklist-grid, .service-grid-modern, .price-grid-modern, .t-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 2.2rem;
    }

    .checklist-card, .s-card, .p-card, .t-card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 2.5rem;
      border: 1px solid rgba(255,255,255,0.05);
      transition: var(--transition);
    }
    .checklist-card:hover, .s-card:hover, .p-card:hover {
      transform: translateY(-8px);
      background: var(--bg-card-hover);
      border-color: var(--accent);
    }

    .p-card.featured {
      border: 3px solid var(--accent);
      position: relative;
      transform: scale(1.03);
    }
