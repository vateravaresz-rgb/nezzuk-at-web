<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nézzük Át! – Független Autóvásárlási Átvizsgálás és Állapotfelmérés</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
        --bg-main: #0b0d11;
        --bg-card: #14171f;
        --bg-card-hover: #1c212c;
        --accent: #ff6a00;
        --accent-glow: rgba(255, 106, 0, 0.25);
        --text-main: #f3f4f6;
        --text-muted: #9ca3af;
        --white: #ffffff;
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background-color: var(--bg-main);
        color: var(--text-main);
        font-family: 'Montserrat', sans-serif;
        line-height: 1.6;
        overflow-x: hidden;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
    section { padding: 6rem 0; }

    .section-header { text-align: center; margin-bottom: 4rem; }
    .section-header h2 { font-size: 2.3rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
    .section-header .line {
        width: 60px; height: 4px; background: var(--accent);
        margin: 1rem auto 0; border-radius: 2px; box-shadow: 0 0 10px var(--accent-glow);
    }

    .navbar {
        position: fixed; top: 0; left: 0; width: 100%;
        background: rgba(11, 13, 17, 0.95); backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05); z-index: 9999; padding: 0.75rem 0;
    }

    .nav-container {
        max-width: 1200px; margin: 0 auto; padding: 0 2rem;
        display: flex; justify-content: space-between; align-items: center;
    }

    .logo { display: flex; align-items: center; gap: 0.75rem; }
    .logo-img {
        height: 45px; width: 45px; border-radius: 50%;
        border: 2px solid var(--accent); object-fit: cover; background: #fff;
    }
    .logo span { font-size: 1.3rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }

    .nav-links { display: flex; list-style: none; gap: 1.5rem; }
    .nav-links a {
        color: var(--text-muted); text-decoration: none; font-weight: 600;
        font-size: 0.85rem; transition: var(--transition); display: flex; align-items: center; gap: 0.4rem;
    }
    .nav-links a:hover { color: var(--accent); }

    .hero {
        position: relative; min-height: 80vh; display: flex; align-items: center;
        justify-content: center; text-align: center; padding-top: 8rem;
        background-size: cover; background-position: center; background-repeat: no-repeat;
    }

    .hero-bg-overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(180deg, rgba(11, 13, 17, 0.65) 0%, #0b0d11 100%); z-index: 1;
    }

    .hero-content { position: relative; z-index: 2; max-width: 850px; padding: 0 2rem; }

    .badge {
        display: inline-flex; align-items: center; gap: 0.5rem; background: var(--accent-glow);
        color: var(--accent); padding: 0.6rem 1.2rem; border-radius: 50px;
        font-size: 0.8rem; font-weight: 700; letter-spacing: 1px; margin-bottom: 2rem;
        border: 1px solid rgba(255, 106, 0, 0.3);
    }

    .hero h1 { font-size: 3.3rem; font-weight: 900; line-height: 1.2; text-transform: uppercase; margin-bottom: 1.5rem; }
    .highlight-text { color: var(--accent); text-shadow: 0 0 30px var(--accent-glow); }
    .hero-sub { font-size: 1.15rem; color: var(--text-muted); margin-bottom: 3rem; font-weight: 500; }
    .hero-sub i { color: var(--accent); }

    .hero-buttons { display: flex; gap: 1.5rem; justify-content: center; }

    .quick-stats { background: rgba(20, 23, 31, 0.6); padding: 3rem 0; border-top: 1px solid rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255, 255, 255, 0.03); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2.5rem; }
    .stat-item { display: flex; align-items: center; gap: 1.5rem; padding: 1rem; }
    .stat-icon-wrapper {
        font-size: 1.8rem; color: var(--accent); background: var(--accent-glow);
        width: 55px; height: 55px; display: flex; align-items: center; justify-content: center;
        border-radius: 12px; border: 1px solid rgba(255, 106, 0, 0.2);
    }
    .stat-item h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.25rem; }
    .stat-item p { color: var(--text-muted); font-size: 0.9rem; }

    .about-content { display: grid; grid-template-columns: 1fr 1.2fr; gap: 4rem; align-items: center; }
    .about-image img { width: 100%; height: auto; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    .about-text p { color: var(--text-muted); margin-bottom: 1.5rem; font-size: 1.05rem; }
    .warning-box { background: rgba(255, 106, 0, 0.04); border-left: 4px solid var(--accent); padding: 1.5rem; border-radius: 0 12px 12px 0; margin: 2rem 0; }
    .warning-title { color: var(--accent); font-weight: 700; font-size: 1.05rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
    .warning-box p { color: var(--text-muted); margin-bottom: 0; font-size: 0.95rem; }

    .checklist-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 2rem; }
    .checklist-card { background: var(--bg-card); border-radius: 16px; padding: 2.5rem 2rem; border: 1px solid rgba(255, 255, 255, 0.02); transition: var(--transition); }
    .checklist-card:hover { background: var(--bg-card-hover); border-color: rgba(255, 106, 0, 0.15); }
    .checklist-card h3 { font-size: 1.3rem; font-weight: 800; color: var(--white); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.75rem; }
    .checklist-card h3 i { color: var(--accent); }
    .checklist-card ul { list-style: none; }
    .checklist-card ul li { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 0.8rem; display: flex; align-items: flex-start; gap: 0.6rem; }
    .checklist-card ul li i { color: var(--accent); margin-top: 0.3rem; font-size: 0.85rem; }
    .checklist-card ul li strong { color: rgba(255,255,255,0.9); }

    .expert-grid-block { display: grid; grid-template-columns: 1.2fr 1fr; gap: 4rem; align-items: center; margin-bottom: 5rem; }
    .expert-grid-block.reverse { grid-template-columns: 1fr 1.2fr; }
    .expert-text-side h3 { font-size: 1.6rem; font-weight: 800; margin-bottom: 1.2rem; text-transform: uppercase; color: var(--white); }
    .expert-text-side p { color: var(--text-muted); margin-bottom: 1.2rem; font-size: 0.95rem; }
    .expert-text-side ul { list-style: none; }
    .expert-text-side ul li { color: var(--text-muted); margin-bottom: 0.6rem; display: flex; align-items: flex-start; gap: 0.5rem; font-size: 0.95rem; }
    .expert-text-side ul li i { color: var(--accent); margin-top: 0.35rem; font-size: 0.85rem; }
    .expert-img-side img { width: 100%; height: auto; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 15px 30px rgba(0,0,0,0.4); }

    .service-grid-modern { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; }
    .s-card { background: var(--bg-card); padding: 3rem 2rem; border-radius: 16px; border: 1px solid rgba(255,255,255,0.02); transition: var(--transition); }
    .s-card:hover { transform: translateY(-5px); background: var(--bg-card-hover); border-color: var(--accent); }
    .s-icon { font-size: 2.2rem; color: var(--accent); margin-bottom: 1.5rem; }
    .s-card h3 { font-size: 1.3rem; font-weight: 700; margin-bottom: 1rem; }
    .s-card p { color: var(--text-muted); font-size: 0.95rem; }

    .prices-modern { background: rgba(15, 18, 25, 0.5); }
    .date-badge { display: inline-block; font-size: 0.85rem; background: rgba(255,255,255,0.08); padding: 0.3rem 0.8rem; border-radius: 50px; font-weight: 500; margin-left: 1rem; color: var(--text-muted); }
    .price-grid-modern { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; }
    .p-card { background: var(--bg-card); border-radius: 16px; padding: 2.5rem 2rem; border: 1px solid rgba(255, 255, 255, 0.03); position: relative; display: flex; flex-direction: column; transition: var(--transition); }
    .p-card.featured { border: 2px solid var(--accent); box-shadow: 0 10px 30px var(--accent-glow); }
    .p-badge { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 0.3rem 1.2rem; border-radius: 50px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }
    .p-amount { font-size: 2.1rem; font-weight: 800; color: var(--white); margin-bottom: 2rem; }
    .p-features { list-style: none; margin-top: auto; }
    .p-features li { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.75rem; display: flex; align-items: flex-start; gap: 0.5rem; }
    .p-features li i { color: var(--accent); margin-top: 0.25rem; }
    .p-card.additional-service { background: rgba(20, 23, 31, 0.4); }
    .p-desc { font-size: 0.9rem; color: var(--text-muted); }

    .t-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 2.5rem; }
    .t-card { background: var(--bg-card); padding: 2.5rem; border-radius: 16px; border: 1px solid rgba(255,255,255,0.02); }
    .t-stars { color: #ffb700; font-size: 0.9rem; margin-bottom: 1rem; }
    .t-card p { font-style: italic; color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.95rem; }
    .t-card h4 { font-weight: 700; color: var(--white); }

    .contact-wrapper { display: grid; grid-template-columns: 1fr 1.2fr; gap: 4rem; }
    .c-links { display: flex; flex-direction: column; gap: 1.25rem; margin-top: 2.5rem; }
